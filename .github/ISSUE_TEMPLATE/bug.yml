name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: The URL that triggered the problem
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: What did you expect? }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: What happened? }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: page2md version (`docker run --rm page2md --version`, or `page2md --version` with the shell wrapper) }
